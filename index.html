<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKO KELONTONG ZIZUEL</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Sidebar Admin (muncul dari kiri) -->
    <div class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <h2>Panel Admin</h2>
            <button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-content">
            <!-- Deskripsi Toko -->
            <div class="admin-section">
                <h3>Deskripsi Toko</h3>
                <textarea id="storeDescription" class="admin-input" rows="3">Toko Kelontong Zizuel menyediakan layanan hosting server bot maupun game, bersedia melengkapi kebutuhan hostingmu</textarea>
                <button class="admin-btn" id="saveDescriptionBtn">Simpan Deskripsi</button>
            </div>

            <!-- Logo Toko -->
            <div class="admin-section">
                <h3>Logo Toko</h3>
                <div class="file-upload-area">
                    <label for="logoUpload" class="file-label">
                        <i class="fas fa-upload"></i> Pilih Gambar Logo
                    </label>
                    <input type="file" id="logoUpload" accept="image/*" hidden>
                    <span class="file-name" id="logoFileName">Belum ada file</span>
                </div>
                <button class="admin-btn" id="saveLogoBtn">Simpan Logo</button>
            </div>

            <!-- Musik Latar -->
            <div class="admin-section">
                <h3>Musik Latar (Auto Play)</h3>
                <div class="file-upload-area">
                    <label for="musicUpload" class="file-label">
                        <i class="fas fa-music"></i> Pilih File MP3
                    </label>
                    <input type="file" id="musicUpload" accept="audio/mpeg" hidden>
                    <span class="file-name" id="musicFileName">Belum ada file</span>
                </div>
                <button class="admin-btn" id="saveMusicBtn">Simpan Musik</button>
            </div>

            <!-- Tambah Produk -->
            <div class="admin-section">
                <h3>Tambah Produk</h3>
                <input type="text" id="productName" class="admin-input" placeholder="Nama Produk">
                <input type="number" id="productPrice" class="admin-input" placeholder="Harga">
                <textarea id="productDesc" class="admin-input" rows="2" placeholder="Deskripsi Produk"></textarea>
                <div class="file-upload-area">
                    <label for="productImage" class="file-label">
                        <i class="fas fa-image"></i> Gambar Produk
                    </label>
                    <input type="file" id="productImage" accept="image/*" hidden>
                    <span class="file-name" id="productImageName">Tidak ada</span>
                </div>
                <button class="admin-btn" id="addProductBtn">Tambah Produk</button>
            </div>

            <!-- Daftar Produk (Edit/Delete) -->
            <div class="admin-section">
                <h3>Daftar Produk</h3>
                <div id="adminProductList" class="admin-product-list"></div>
            </div>
        </div>
    </div>

    <!-- Overlay untuk sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container" id="logoContainer">
                <img id="storeLogo" class="store-logo" src="https://via.placeholder.com/60x60/1a2639/9bbaff?text=Z" alt="Toko Zizuel">
                <div class="store-title">
                    <h1>TOKO KELONTONG</h1>
                    <h2>ZIZUEL</h2>
                </div>
            </div>
            <div class="auth-buttons">
                <button class="btn-login" id="navLogin">LOGIN</button>
                <button class="btn-logout hidden" id="navLogout">KELUAR</button>
            </div>
        </header>

        <!-- Deskripsi Toko -->
        <div class="store-description" id="storeDescriptionDisplay">
            <p>Toko Kelontong Zizuel menyediakan layanan hosting server bot maupun game, bersedia melengkapi kebutuhan hostingmu</p>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Hidden Audio Player -->
    <audio id="bgMusic" loop></audio>

    <script src="index.js"></script>
</body>
</html>
